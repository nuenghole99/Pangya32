<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ปังย่า บ้าน32</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:#faf7f4;color:#1a1614;max-width:480px;margin:0 auto;min-height:100vh}
h1,h2{font-family:'Prompt',sans-serif}
.hero{background:linear-gradient(135deg,#ff5a1f,#e0440e);color:#fff;padding:22px 18px 26px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-30px;top:-30px;width:150px;height:150px;background:rgba(255,255,255,.1);border-radius:50%}
.hero-badge{display:inline-block;background:rgba(255,255,255,.2);font-size:12px;padding:3px 10px;border-radius:999px;margin-bottom:9px;font-weight:600}
.hero h1{font-size:24px;font-weight:700}
.hero p{font-size:13px;opacity:.9;margin-top:4px}
.hero-open{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:12px;background:rgba(0,0,0,.15);width:fit-content;padding:5px 11px;border-radius:999px}
.dot{width:7px;height:7px;border-radius:50%;background:#7cffb2;box-shadow:0 0 0 3px rgba(124,255,178,.3)}
.wrap{padding:14px 14px 120px}
.stitle{font-family:'Prompt';font-weight:600;font-size:17px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.stitle-bar{width:4px;height:16px;background:#ff5a1f;border-radius:3px}
.loading{text-align:center;padding:40px;color:#8a817c;font-size:14px}
.card{background:#fff;border-radius:16px;box-shadow:0 3px 12px rgba(26,22,20,.07);display:flex;gap:10px;padding:10px;margin-bottom:12px}
.thumb{width:88px;height:88px;border-radius:12px;flex-shrink:0;overflow:hidden;background:linear-gradient(135deg,#ffe3d2,#ffd0b5);display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.thumb img{width:100%;height:100%;object-fit:cover}
.card-tag{position:absolute;top:6px;left:6px;background:#ff5a1f;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}
.info{flex:1;min-width:0;display:flex;flex-direction:column}
.nm{font-family:'Prompt';font-weight:600;font-size:15px;line-height:1.2}
.ds{font-size:12px;color:#8a817c;margin-top:2px;line-height:1.3}
.bot{margin-top:auto;padding-top:6px;display:flex;align-items:center;justify-content:space-between}
.pr{font-family:'Prompt';font-weight:700;font-size:16px;color:#e0440e}
.ab{background:#ff5a1f;color:#fff;border:none;font-family:'Prompt';font-weight:600;font-size:13px;padding:7px 14px;border-radius:999px;cursor:pointer;box-shadow:0 2px 8px rgba(255,90,31,.3)}
.qty{display:flex;align-items:center;gap:8px;background:#fff1ea;border-radius:999px;padding:3px}
.qty button{width:28px;height:28px;border:none;border-radius:50%;background:#ff5a1f;color:#fff;font-size:18px;font-weight:600;cursor:pointer;display:grid;place-items:center}
.qty .n{font-family:'Prompt';font-weight:700;min-width:18px;text-align:center;font-size:15px}
.cartbar{position:fixed;left:50%;transform:translateX(-50%) translateY(120px);bottom:14px;width:calc(100% - 28px);max-width:452px;background:#1a1614;color:#fff;border-radius:14px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 24px rgba(0,0,0,.25);cursor:pointer;opacity:0;transition:transform .28s cubic-bezier(.2,.8,.3,1),opacity .2s;z-index:40}
.cartbar.on{transform:translateX(-50%) translateY(0);opacity:1}
.cartbar .cl{display:flex;align-items:center;gap:10px}
.cartbar .cc{background:#fff;color:#1a1614;font-family:'Prompt';font-weight:700;width:32px;height:32px;border-radius:10px;display:grid;place-items:center;font-size:14px}
.ov{position:fixed;inset:0;background:rgba(26,22,20,.5);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50}
.ov.on{opacity:1;pointer-events:auto}
.sh{position:fixed;left:50%;transform:translateX(-50%) translateY(100%);bottom:0;width:100%;max-width:480px;background:#faf7f4;border-radius:20px 20px 0 0;z-index:60;transition:transform .3s cubic-bezier(.2,.8,.3,1);max-height:92vh;display:flex;flex-direction:column}
.sh.on{transform:translateX(-50%) translateY(0)}
.shh{padding:14px 18px 11px;border-bottom:1px solid #eee7e2;position:relative}
.shh h2{font-size:18px;font-weight:600}
.grab{width:36px;height:4px;background:#eee7e2;border-radius:4px;margin:0 auto 11px}
.cx{position:absolute;right:14px;top:14px;width:28px;height:28px;border:none;background:#fff;border-radius:50%;font-size:17px;cursor:pointer;color:#8a817c}
.shb{overflow-y:auto;padding:6px 18px;flex:1}
.crow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #eee7e2}
.crow .ct{width:44px;height:44px;border-radius:9px;overflow:hidden;background:linear-gradient(135deg,#ffe3d2,#ffd0b5);display:grid;place-items:center;font-size:20px;flex-shrink:0}
.crow .ct img{width:100%;height:100%;object-fit:cover}
.crow .cn{font-family:'Prompt';font-weight:600;font-size:14px}
.crow .cu{font-size:12px;color:#8a817c}
.crow .cq{display:flex;align-items:center;gap:8px}
.crow .cq button{width:25px;height:25px;border:1px solid #eee7e2;background:#fff;border-radius:50%;font-size:15px;cursor:pointer;color:#ff5a1f;display:grid;place-items:center}
.empty{text-align:center;color:#8a817c;padding:30px;font-size:13px}
.fi{margin:13px 0 3px}
.fi label{font-family:'Prompt';font-weight:500;font-size:13.5px;display:block;margin-bottom:5px}
.rq{color:#ff5a1f}
.fi input,.fi textarea{width:100%;border:1.5px solid #eee7e2;border-radius:12px;padding:11px 13px;font-size:15px;background:#fff;outline:none}
.fi textarea{resize:none;height:58px}
.pl{display:flex;flex-direction:column;gap:8px}
.pr2{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #eee7e2;border-radius:12px;padding:10px 12px;cursor:pointer}
.pr2.sel{border-color:#ff5a1f;background:#fff1ea}
.pr2 .pe{font-size:20px}
.pr2 .pb{flex:1;font-family:'Prompt';font-weight:500;font-size:14px}
.pr2 .pt{width:22px;height:22px;border-radius:50%;border:2px solid #eee7e2;display:grid;place-items:center;color:#fff;font-size:13px}
.pr2.sel .pt{background:#ff5a1f;border-color:#ff5a1f}
.sum{background:#fff;border-radius:12px;padding:13px;margin-top:13px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sum .r{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;color:#8a817c}
.sum .rt{font-family:'Prompt';font-weight:700;font-size:17px;color:#1a1614;border-top:1px dashed #eee7e2;margin-top:7px;padding-top:9px}
.sf{padding:12px 18px calc(12px + env(safe-area-inset-bottom));border-top:1px solid #eee7e2;background:#fff}
.sn{width:100%;background:#13b36a;color:#fff;border:none;border-radius:13px;padding:14px;font-family:'Prompt';font-weight:600;font-size:16px;cursor:pointer;box-shadow:0 4px 14px rgba(19,179,106,.3);display:flex;align-items:center;justify-content:center;gap:8px}
.sn:disabled{background:#cfc9c4;box-shadow:none}
.ps{position:fixed;inset:0;background:#faf7f4;z-index:65;display:none;flex-direction:column;overflow-y:auto;padding:20px 16px 40px}
.ps.on{display:flex}
.pc{background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:22px 18px;text-align:center;position:relative;margin:auto;width:100%;max-width:360px}
.pc h2{font-size:19px;margin-bottom:4px}
.pc .am{font-family:'Prompt';font-weight:700;font-size:32px;color:#e0440e;margin:5px 0 14px}
.qrb{border:2px dashed #eee7e2;border-radius:14px;padding:12px;display:inline-block;min-width:190px;min-height:190px}
.qrb img{width:190px;height:190px;display:block}
.ppto{font-size:13px;color:#8a817c;margin-top:10px}
.ppto b{color:#1a1614;font-size:15px}
.cpb{margin-top:7px;background:#fff1ea;color:#e0440e;border:1px solid #ffd0b5;border-radius:999px;font-family:'Prompt';font-size:12px;padding:6px 14px;cursor:pointer}
.ph{font-size:13px;color:#8a817c;margin:12px 0;line-height:1.5;background:#fff1ea;padding:9px;border-radius:9px}
.si{width:100%;max-width:200px;border-radius:10px;margin:0 auto 10px;display:block;border:1px solid #eee}
.ppl{display:inline-block;background:#003d6a;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;margin-bottom:10px}
.gb{width:100%;background:#fff;border:1.5px solid #eee7e2;color:#1a1614;font-family:'Prompt';font-size:14px;padding:12px;cursor:pointer;margin-top:8px;border-radius:12px}
.dn{position:fixed;inset:0;background:#faf7f4;z-index:70;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px}
.dn.on{display:flex}
.dn .ring{width:90px;height:90px;border-radius:50%;background:#13b36a;display:grid;place-items:center;font-size:46px;color:#fff;margin-bottom:18px;animation:pop .4s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.dn h2{font-size:21px;margin-bottom:7px}
.dn p{color:#8a817c;font-size:14px;line-height:1.5;max-width:280px}
.dn .ag{margin-top:22px;background:#ff5a1f;color:#fff;border:none;border-radius:13px;padding:13px 28px;font-family:'Prompt';font-size:15px;cursor:pointer}
.ts{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(20px);background:#1a1614;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-family:'Prompt';opacity:0;pointer-events:none;transition:all .25s;z-index:90;white-space:nowrap}
.ts.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">🛵 ส่งถึงหน้าบ้าน</div>
  <h1 id="shopTitle">ปังย่า บ้าน32</h1>
  <p>สั่งง่ายผ่านมือถือ</p>
  <div class="hero-open"><span class="dot"></span> เปิดรับออเดอร์อยู่</div>
</div>

<div class="wrap">
  <div class="stitle"><span class="stitle-bar"></span> เมนูทั้งหมด</div>
  <div id="menuWrap"><div class="loading">⏳ กำลังโหลดเมนู...</div></div>
</div>

<div class="cartbar" id="cb" onclick="openSh()">
  <div class="cl">
    <div class="cc" id="ccnt">0</div>
    <div><div style="font-size:12px;opacity:.7">ดูตะกร้า</div><div style="font-family:'Prompt';font-weight:600;font-size:14px" id="ctot">฿0</div></div>
  </div>
  <div style="font-family:'Prompt';font-weight:600;font-size:14px">สั่งเลย ›</div>
</div>

<div class="ov" id="ov" onclick="closeSh()"></div>
<div class="sh" id="sh">
  <div class="shh"><div class="grab"></div><h2>ตะกร้า</h2><button class="cx" onclick="closeSh()">✕</button></div>
  <div class="shb">
    <div id="citems"></div>
    <div class="fi"><label>บ้านเลขที่ / จุดส่ง <span class="rq">*</span></label><input id="house" type="text" placeholder="เช่น 99/1 ซอย 3"></div>
    <div class="fi"><label>ชื่อผู้สั่ง</label><input id="cname" type="text" placeholder="เช่น คุณเอ"></div>
    <div class="fi"><label>วิธีชำระเงิน</label><div id="pays" class="pl"></div></div>
    <div class="fi"><label>หมายเหตุ</label><textarea id="note" placeholder="เช่น ไม่เผ็ด / ขอช้อนส้อม"></textarea></div>
    <div class="sum">
      <div class="r"><span>ค่าอาหาร</span><span id="sf">฿0</span></div>
      <div class="r rt"><span>ยอดรวม</span><span id="st">฿0</span></div>
    </div>
  </div>
  <div class="sf"><button class="sn" id="snb" onclick="confirm_()"><span>🛎️</span> ถัดไป</button></div>
</div>

<div class="ps" id="ps">
  <div class="pc">
    <button class="cx" onclick="closePay()">✕</button>
    <div class="ppl">PromptPay</div>
    <h2>สแกนจ่ายก่อนสั่ง</h2>
    <div class="am" id="pamt">฿0</div>
    <div class="qrb" id="qrbox"></div>
    <div class="ppto" id="ppto"></div>
    <button class="cpb" onclick="copyPP()">📋 คัดลอกเลขพร้อมเพย์</button>
    <p class="ph">1. สแกน QR หรือคัดลอกไปจ่ายในแอปธนาคาร<br>2. แนบสลิป แล้วกดส่งออเดอร์</p>
    <div id="slipPrev"></div>
    <input type="file" id="slipIn" accept="image/*" style="display:none" onchange="onSlip(event)">
    <input type="file" id="slipCam" accept="image/*" capture="environment" style="display:none" onchange="onSlip(event)">
    <div style="display:flex;gap:8px;margin-top:0">
      <button id="slipBtn" class="gb" style="flex:1;padding:11px;font-size:13px" onclick="document.getElementById('slipIn').click()">🖼️ เลือกรูปในเครื่อง</button>
      <button class="gb" style="flex:1;padding:11px;font-size:13px" onclick="document.getElementById('slipCam').click()">📷 ถ่ายสลิป</button>
    </div>
    <button class="sn" style="margin-top:9px" onclick="payOk()">✅ จ่ายแล้ว ส่งออเดอร์</button>
  </div>
</div>

<div class="dn" id="dn">
  <div class="ring">✓</div>
  <h2>ส่งออเดอร์แล้ว!</h2>
  <p id="dmsg"></p>
  <button class="ag" onclick="reset_()">สั่งเพิ่ม</button>
</div>
<div class="ts" id="ts"></div>

<script>
// ===== ตั้งค่า Apps Script / Dashboard Save V3 =====
var API = "https://script.google.com/macros/s/AKfycbzR4NctAcK0emHqllkrye9beSshAx8CA-h-djfMfku8eCZ_MwUj04-kBGT4042JCk6PMQ/exec";
var PAYS = [
  {id:"pp",lb:"สแกนจ่ายก่อน (พร้อมเพย์)",em:"📱",tp:"pp"},
  {id:"cod",lb:"จ่ายเงินสดตอนรับ",em:"💵",tp:"cod"},
  {id:"p60",lb:"โครงการ 60/40 (จ่ายหน้าบ้าน)",em:"🪙",tp:"other"}
];
// ============================================

var cart={},pm=PAYS[0].id,slip=null,lo=null;
var menuData=[],ppNum="0839617064",qrImg="";

function Q(id){return document.getElementById(id)}
function B(n){return"฿"+Number(n).toLocaleString("th-TH")}
function ti(m){return m.img?'<img src="'+m.img+'" onerror="this.style.display=\'none\';this.parentNode.textContent=\''+m.emoji+'\'">':m.emoji||"🍽️"}
function toast(msg){var t=Q("ts");t.textContent=msg;t.classList.add("on");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("on")},2200)}

// โหลดเมนูจาก Sheet
function loadMenu(){
  if(!API){renderMenuData([]);return;}
  var fn="_m"+Date.now();
  window[fn]=function(d){
    delete window[fn];
    menuData=d.menu||[];
    var rawPP = String(d.pp||"0839617064").replace(/\D/g,"");
    if(rawPP.length===9) rawPP="0"+rawPP;
    ppNum=rawPP||"0839617064";
    qrImg=d.qr||"";
    renderMenuData(menuData);
  };
  var s=document.createElement("script");
  s.src=API+"?cb="+fn+"&a=all&_="+Date.now();
  s.onerror=function(){delete window[fn];renderMenuData([]);};
  document.head.appendChild(s);
}

function renderMenuData(menu){
  var w=Q("menuWrap");
  if(!menu.length){w.innerHTML='<div class="loading">ยังไม่มีเมนู</div>';return;}
  w.innerHTML=menu.map(function(m,i){
    var q=cart[i]||0;
    var ctrl=q>0?'<div class="qty"><button onclick="dc('+i+')">−</button><span class="n">'+q+'</span><button onclick="ic('+i+')">+</button></div>'
               :'<button class="ab" onclick="ic('+i+')">+ เพิ่ม</button>';
    var tag=m.tag?'<span class="card-tag">'+m.tag+'</span>':'';
    return '<div class="card"><div class="thumb">'+tag+ti(m)+'</div>'
      +'<div class="info"><div class="nm">'+m.name+'</div><div class="ds">'+(m.desc||'')+'</div>'
      +'<div class="bot"><div class="pr">'+B(m.price)+'</div><div>'+ctrl+'</div></div></div></div>';
  }).join("");
}

function ic(i){cart[i]=(cart[i]||0)+1;rf()}
function dc(i){if(cart[i]){cart[i]--;if(!cart[i])delete cart[i];}rf()}
function tots(){var c=0,s=0;for(var k in cart){c+=cart[k];s+=cart[k]*menuData[k].price;}return{c:c,s:s}}
function rf(){renderMenuData(menuData);renderCart();renderPays();var t=tots();Q("ccnt").textContent=t.c;Q("ctot").textContent=B(t.s);Q("cb").classList.toggle("on",t.c>0)}
function renderCart(){
  var ks=Object.keys(cart),s=tots().s;
  Q("sf").textContent=B(s);Q("st").textContent=B(s);Q("snb").disabled=!ks.length;
  if(!ks.length){Q("citems").innerHTML='<div class="empty">ยังไม่มีรายการ</div>';return;}
  Q("citems").innerHTML=ks.map(function(i){var m=menuData[i],q=cart[i];
    return '<div class="crow"><div class="ct">'+ti(m)+'</div><div style="flex:1"><div class="cn">'+m.name+'</div><div class="cu">'+B(m.price)+' × '+q+' = '+B(m.price*q)+'</div></div><div class="cq"><button onclick="dc('+i+')">−</button><span style="font-family:Prompt;font-weight:700;min-width:14px;text-align:center">'+q+'</span><button onclick="ic('+i+')">+</button></div></div>';
  }).join("");
}
function renderPays(){Q("pays").innerHTML=PAYS.map(function(p){return'<div class="pr2 '+(p.id===pm?"sel":"")+'" onclick="sp(\''+p.id+'\')"><div class="pe">'+p.em+'</div><div class="pb">'+p.lb+'</div><div class="pt">'+(p.id===pm?"✓":"")+'</div></div>'}).join("")}
function sp(id){pm=id;renderPays()}
function openSh(){Q("ov").classList.add("on");Q("sh").classList.add("on")}
function closeSh(){
  Q("ov").classList.remove("on");
  Q("sh").classList.remove("on");
}
function plb(){return(PAYS.find(function(x){return x.id===pm})||{}).lb||""}
function bText(o){var L=["🛎️ ออเดอร์ใหม่ — ปังย่า บ้าน32","🏠 บ้าน: "+o.house];if(o.name)L.push("👤 "+o.name);L.push("————————————");for(var k in cart)L.push("• "+menuData[k].name+" ×"+cart[k]+" "+B(menuData[k].price*cart[k]));L.push("————————————");L.push("💰 รวม "+B(o.total));L.push("💳 "+o.pay);if(o.note)L.push("📝 "+o.note);return L.join("\n")}
function sendLine(text){window.open("https://line.me/R/share?text="+encodeURIComponent(text),"_blank")}

function orderItems(){
  var arr=[];
  for(var k in cart){
    var m=menuData[k]||{};
    var q=cart[k]||0;
    arr.push({name:m.name||"",price:Number(m.price||0),qty:q,amount:Number(m.price||0)*q});
  }
  return arr;
}
function saveOrderToSheet(order){
  if(!API || !order)return;

  // เก็บเฉพาะข้อมูลที่ต้องใช้ทำ Dashboard ลดโอกาส URL ยาว/ส่งไม่สำเร็จ
  var clean={
    house:order.house||"",
    name:order.name||"",
    note:order.note||"",
    total:Number(order.total||0),
    pay:order.pay||"",
    payId:order.payId||"",
    status:order.status||"",
    hasSlip:!!order.hasSlip,
    items:order.items||[]
  };

  try{
    // วิธีหลัก: POST ไป Apps Script เพื่อบันทึกลง Orders
    // mode no-cors ใช้กับ GitHub Pages -> Apps Script ได้ แม้อ่าน response ไม่ได้
    fetch(API,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(clean)
    }).catch(function(err){console.log("post save failed",err);});
  }catch(e){
    console.log("post save error",e);
  }

  try{
    // วิธีสำรอง: JSONP GET สำหรับบางเครื่องที่ POST ไม่วิ่ง
    var fn="_o"+Date.now()+Math.floor(Math.random()*1000);
    window[fn]=function(res){delete window[fn];console.log("order saved by jsonp",res);};
    var payload=encodeURIComponent(JSON.stringify(clean));
    var s=document.createElement("script");
    s.src=API+"?a=save&cb="+fn+"&payload="+payload+"&_="+Date.now();
    s.onerror=function(){delete window[fn];console.log("jsonp save order failed");};
    document.head.appendChild(s);
    setTimeout(function(){if(s&&s.parentNode)s.parentNode.removeChild(s);},12000);
  }catch(e2){
    console.log("jsonp saveOrderToSheet error",e2);
  }
}

function confirm_(){
  var house=Q("house").value.trim();
  if(!house){toast("กรุณากรอกบ้านเลขที่");Q("house").focus();return;}
  var t=tots();
  lo={house:house,name:Q("cname").value.trim(),note:Q("note").value.trim(),total:t.s,pay:plb(),payId:pm,items:orderItems(),status:"created"};
  lo.text=bText(lo);
  var p=PAYS.find(function(x){return x.id===pm});

  if(p&&p.tp==="pp"){
    // เส้นทาง PromptPay: เปิดหน้าจ่ายก่อน แล้วค่อยปิดตะกร้า
    // เพื่อไม่ให้ดูเหมือนเด้งกลับหน้าแรก ถ้ามือถือสร้าง QR ช้า/มี error
    openPay(t.s);
    Q("sh").classList.remove("on");
    Q("ov").classList.remove("on");
  }else{
    closeSh();
    setTimeout(function(){
      lo.status="sent_line";
      saveOrderToSheet(lo);
      sendLine(lo.text);
      showDone("กดส่งข้อความใน LINE ให้ร้าน 🧑‍🍳");
    },300);
  }
}

// PromptPay QR
function ppF(i,v){return i+String(v.length).padStart(2,"0")+v}
function ppC(s){var c=0xFFFF;for(var i=0;i<s.length;i++){c^=s.charCodeAt(i)<<8;for(var j=0;j<8;j++){c=(c&0x8000)?((c<<1)^0x1021):(c<<1);c&=0xFFFF}}return c.toString(16).toUpperCase().padStart(4,"0")}
function ppQR(t,a){var id=(t||"").replace(/[^0-9]/g,"");var acc=id.length>=13?ppF("02",id):ppF("01",("0000000000000"+id.replace(/^0/,"66")).slice(-13));var mc=ppF("29",ppF("00","A000000677010111")+acc);var p=ppF("00","01")+ppF("01",a?"12":"11")+mc+ppF("53","764");if(a)p+=ppF("54",Number(a).toFixed(2));p+=ppF("58","TH")+"6304";return p+ppC(p)}

function openPay(amt){
  var ps=Q("ps"), box=Q("qrbox"), slipPrev=Q("slipPrev"), slipBtn=Q("slipBtn");
  if(!ps || !box){toast("เปิดหน้าชำระเงินไม่ได้");return;}

  // เปิดหน้าชำระเงินทันที ห้ามรอ QR เพราะบางเครื่อง/CDN ช้าแล้วดูเหมือนเด้งกลับหน้าแรก
  ps.style.display="flex";
  ps.classList.add("on");

  var pn=String(ppNum||"0839617064");
  Q("pamt").textContent=B(amt);
  Q("ppto").innerHTML="พร้อมเพย์<br><b>"+pn+"</b><br>ปังย่า บ้าน32";
  if(slipPrev)slipPrev.innerHTML="";
  if(slipBtn)slipBtn.innerHTML="🖼️ เลือกรูปในเครื่อง";
  slip=null;

  // ตั้ง fallback ไว้ก่อน ต่อให้สร้าง QR ไม่ได้ ก็ยังโอนด้วยเลขพร้อมเพย์ได้
  box.innerHTML='<div style="padding:20px;text-align:center;color:#8a817c;line-height:2">โอนพร้อมเพย์<br><b style="font-size:22px;color:#e0440e">'+pn+'</b><br>ยอด '+B(amt)+'</div>';

  try{
    if(qrImg){
      box.innerHTML='<img src="'+qrImg+'" style="width:190px;height:190px;object-fit:contain;border-radius:8px">';
      return;
    }
    if(typeof qrcode==="undefined")return;
    var q=qrcode(0,"M");
    q.addData(ppQR(pn,amt));
    q.make();
    box.innerHTML=q.createImgTag(5,8);
    var img=box.querySelector("img");
    if(img){img.style.width="190px";img.style.height="190px";}
  }catch(e){
    console.log("QR fallback",e);
  }
}
function closePay(){Q("ps").classList.remove("on");Q("ps").style.display="none";}
function copyPP(){if(navigator.clipboard)navigator.clipboard.writeText(ppNum).then(function(){toast("คัดลอกแล้ว ✓")});else toast(ppNum)}
function onSlip(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var i=new Image();i.onload=function(){var sc=Math.min(1,800/i.width),w=Math.round(i.width*sc),h=Math.round(i.height*sc);var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(i,0,0,w,h);slip=c.toDataURL("image/jpeg",.7);Q("slipPrev").innerHTML='<img class="si" src="'+slip+'">';var slipBtn=Q("slipBtn");if(slipBtn)slipBtn.innerHTML="✅ แนบสลิปแล้ว"};i.src=ev.target.result};r.readAsDataURL(f)}
function payOk(){var t=lo.text;if(slip)t+="\n🧾 (มีสลิปแนบ)";lo.status="paid_promptpay_sent_line";lo.hasSlip=!!slip;saveOrderToSheet(lo);sendLine(t);closePay();showDone("กดส่งข้อความใน LINE ให้ร้าน 🧑‍🍳")}
function showDone(msg){Q("dmsg").textContent=msg;Q("dn").classList.add("on")}
function reset_(){for(var k in cart)delete cart[k];Q("house").value="";Q("cname").value="";Q("note").value="";pm=PAYS[0].id;slip=null;lo=null;Q("dn").classList.remove("on");rf()}

loadMenu();
</script>
